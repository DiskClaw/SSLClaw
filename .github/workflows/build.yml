name: Build SSLClaw

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build Release x64
      run: msbuild SSLClaw.sln /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /m

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: SSLClaw-v1.0
        path: x64\Release\SSLClaw.exe
