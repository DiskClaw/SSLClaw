name: Build SSLClaw

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build Release x64
      run: msbuild SSLClaw.sln /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /m

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: SSLClaw
        path: x64\Release\SSLClaw.exe

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: x64\Release\SSLClaw.exe
        body: |
          ### v1.1 变更说明

          - 增加正式环境和测试环境切换
          - 修复续签功能
          - 统一证书文件命名格式：HTTP-01 和 DNS-01 申请的证书/私钥文件名统一使用域名原格式，不再将 . 替换为 _
          - 修复此前 HTTP-01 申请时文件名为 example_com.key 而 DNS-01 为 example.com.key 的不一致问题
